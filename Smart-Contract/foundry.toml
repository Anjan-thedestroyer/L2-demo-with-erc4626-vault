[rpc_endpoints]
sepolia= "${RPC_URL_SP}"
arbitrumSepolia = "${RPC_URL_ARB}"
optimismSepolia = "${RPC_URL_OP}"

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/"
]
